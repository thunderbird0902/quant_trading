ib:
  # Interactive Brokers 配置（预留）
  # 连接 TWS 或 IB Gateway（需本地安装）
  host: "127.0.0.1"
  port: 7497                      # TWS 模拟盘; 实盘=7496; IB Gateway 模拟=4002/实盘=4001
  client_id: 1
  account: ""                     # 账户 ID（多账户时必填）
  timeout: 10                     # 连接超时（秒）

  # 交易设置
  order:
    default_currency: "USD"
    default_exchange: "SMART"     # IB 智能路由
