okx:
  # ── 账户设置 ──────────────────────────────────────────────────
  # api_key: "7bff2e58-a990-4448-882a-98f3efbce6d5"
  # secret_key: "97F2FF5CB4C002DA08CC21A2819F5368"
  # passphrase: "Wj19960902."
  # flag: "0"            # 1=模拟盘, 0=实盘

  api_key: "9c69c3c5-77a9-4fe2-b549-28f70f64955d"
  secret_key: "1BBD82DB2F25A7B05D69AF65163DFA1B"
  passphrase: "Wj19960902."
  flag: "1"            # 1=模拟盘, 0=实盘

  # ── 现货交易白名单 ────────────────────────────────────────────
  spot_whitelist:
    - "BTC-USDT"
    - "ETH-USDT"
    - "SOL-USDT"
    - "BNB-USDT"

  # ── 衍生品交易白名单 ──────────────────────────────────────────
  swap_whitelist:
    - "BTC-USDT-SWAP"
    - "ETH-USDT-SWAP"
    - "SOL-USDT-SWAP"

  # ── 合约默认设置 ──────────────────────────────────────────────
  default_leverage: 5             # 默认杠杆倍数
  default_margin_mode: "cross"    # cross（全仓）/ isolated（逐仓）
  default_position_mode: "net"    # net（买卖模式）/ long_short（多空模式）

  # ── WebSocket 设置 ────────────────────────────────────────────
  websocket:
    heartbeat_interval: 25        # 心跳间隔（秒）
    reconnect_delay: 5            # 重连等待（秒）
    max_reconnect_delay: 60       # 最大重连等待（秒）

  # ── 限价单设置 ────────────────────────────────────────────────
  order:
    default_type: "limit"         # limit / market
    cancel_all_after: 0           # 倒计时全撤（秒，0=不启用）
